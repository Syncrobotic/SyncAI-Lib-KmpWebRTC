name: CI

on:
  push:
    branches: [ main, dev ]
  pull_request:
    branches: [ main ]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Build JVM target
        run: ./gradlew jvmMainClasses

      - name: Build Android target
        run: ./gradlew bundleReleaseAar

      - name: Build JS target
        run: ./gradlew jsJar

      - name: Build WasmJS target
        run: ./gradlew wasmJsJar

      - name: Build iOS framework
        run: ./gradlew linkPodReleaseFrameworkIosArm64

      - name: Run tests
        run: ./gradlew jvmTest

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: build/reports/tests/
          retention-days: 14
